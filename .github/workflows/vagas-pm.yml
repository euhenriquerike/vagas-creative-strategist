name: Vagas Creative Strategist - automatic search

on:
  schedule:
    # 06:00 BRT (UTC-3) = 09:00 UTC, Monday to Saturday
    - cron: "0 9 * * 1-6"
    # 18:00 BRT (UTC-3) = 21:00 UTC, Monday to Saturday
    - cron: "0 21 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vagas-cs-publish
  cancel-in-progress: false

jobs:
  search-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Search jobs and regenerate site
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: python search_and_generate.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vagas/*.md vagas/url_history.json index.html broken_links.json
          if git diff --cached --quiet; then
            echo "No generated changes to publish."
            exit 0
          fi
          git commit -m "auto: vagas CS $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin HEAD:main
